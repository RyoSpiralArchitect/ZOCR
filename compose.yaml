services:
  api:
    image: ${ZOCR_API_IMAGE:-zocr-suite:latest}
    build:
      context: .
      args:
        ZOCR_EXTRAS: ${ZOCR_EXTRAS:-api}
        ZOCR_APT_PACKAGES: ${ZOCR_APT_PACKAGES:-poppler-utils}
    command: ["zocr-api", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      ZOCR_API_AUTH_MODE: ${ZOCR_API_AUTH_MODE:-auto}
      ZOCR_API_AUTHZ_STRICT: ${ZOCR_API_AUTHZ_STRICT:-0}
      ZOCR_API_KEY: ${ZOCR_API_KEY:-}
      ZOCR_API_KEY_TENANT: ${ZOCR_API_KEY_TENANT:-default}
      ZOCR_API_KEY_ROLES: ${ZOCR_API_KEY_ROLES:-}
      ZOCR_API_KEY_SCOPES: ${ZOCR_API_KEY_SCOPES:-}
      ZOCR_API_KEYS_JSON: ${ZOCR_API_KEYS_JSON:-}
      ZOCR_API_JWT_SECRET: ${ZOCR_API_JWT_SECRET:-}
      ZOCR_API_JWT_JWKS_URL: ${ZOCR_API_JWT_JWKS_URL:-}
      ZOCR_API_JWT_JWKS_PATH: ${ZOCR_API_JWT_JWKS_PATH:-}
      ZOCR_API_JWT_JWKS_JSON: ${ZOCR_API_JWT_JWKS_JSON:-}
      ZOCR_API_OIDC_DISCOVERY_URL: ${ZOCR_API_OIDC_DISCOVERY_URL:-}
      ZOCR_API_JWT_JWKS_CACHE_TTL_SEC: ${ZOCR_API_JWT_JWKS_CACHE_TTL_SEC:-300}
      ZOCR_API_JWT_ALGORITHMS: ${ZOCR_API_JWT_ALGORITHMS:-HS256}
      ZOCR_API_JWT_ISSUER: ${ZOCR_API_JWT_ISSUER:-}
      ZOCR_API_JWT_AUDIENCE: ${ZOCR_API_JWT_AUDIENCE:-}
      ZOCR_API_JWT_TENANT_CLAIM: ${ZOCR_API_JWT_TENANT_CLAIM:-tenant_id}
      ZOCR_API_JWT_SUBJECT_CLAIM: ${ZOCR_API_JWT_SUBJECT_CLAIM:-sub}
      ZOCR_API_JWT_ROLES_CLAIM: ${ZOCR_API_JWT_ROLES_CLAIM:-roles}
      ZOCR_API_JWT_SCOPE_CLAIM: ${ZOCR_API_JWT_SCOPE_CLAIM:-scope}
      ZOCR_API_JWT_ADMIN_CLAIM: ${ZOCR_API_JWT_ADMIN_CLAIM:-is_admin}
      ZOCR_API_JWT_ADMIN_SCOPE: ${ZOCR_API_JWT_ADMIN_SCOPE:-zocr.admin}
      ZOCR_API_JWT_CLOCK_SKEW_SEC: ${ZOCR_API_JWT_CLOCK_SKEW_SEC:-30}
      ZOCR_API_MAX_UPLOAD_MB: ${ZOCR_API_MAX_UPLOAD_MB:-50}
      ZOCR_API_WORKERS: ${ZOCR_API_WORKERS:-1}
      ZOCR_API_CONCURRENCY: ${ZOCR_API_CONCURRENCY:-1}
      ZOCR_API_RUN_TIMEOUT_SEC: ${ZOCR_API_RUN_TIMEOUT_SEC:-900}
      ZOCR_API_RATE_LIMIT_PER_MIN: ${ZOCR_API_RATE_LIMIT_PER_MIN:-0}
      ZOCR_API_RATE_LIMIT_BACKEND: ${ZOCR_API_RATE_LIMIT_BACKEND:-local}
      ZOCR_API_RATE_LIMIT_REDIS_URL: ${ZOCR_API_RATE_LIMIT_REDIS_URL:-}
      ZOCR_API_RATE_LIMIT_REDIS_PREFIX: ${ZOCR_API_RATE_LIMIT_REDIS_PREFIX:-zocr_rate_limit}
      ZOCR_API_RATE_LIMIT_WINDOW_SEC: ${ZOCR_API_RATE_LIMIT_WINDOW_SEC:-60}
      ZOCR_API_STORAGE_BACKEND: ${ZOCR_API_STORAGE_BACKEND:-local}
      ZOCR_API_METADATA_BACKEND: ${ZOCR_API_METADATA_BACKEND:-local}
      ZOCR_API_STORAGE_DIR: ${ZOCR_API_STORAGE_DIR:-/data}
      ZOCR_API_QUEUE_BACKEND: ${ZOCR_API_QUEUE_BACKEND:-inline}
      ZOCR_API_DATABASE_URL: ${ZOCR_API_DATABASE_URL:-postgresql://zocr:zocr@postgres:5432/zocr}
      ZOCR_API_DB_AUTO_INIT: ${ZOCR_API_DB_AUTO_INIT:-1}
      ZOCR_API_REDIS_URL: ${ZOCR_API_REDIS_URL:-redis://redis:6379/0}
      ZOCR_API_REDIS_STREAM: ${ZOCR_API_REDIS_STREAM:-zocr_jobs}
      ZOCR_API_REDIS_GROUP: ${ZOCR_API_REDIS_GROUP:-zocr_workers}
      ZOCR_API_S3_BUCKET: ${ZOCR_API_S3_BUCKET:-}
      ZOCR_API_S3_PREFIX: ${ZOCR_API_S3_PREFIX:-zocr}
      ZOCR_API_S3_REGION: ${ZOCR_API_S3_REGION:-}
      ZOCR_API_S3_ENDPOINT_URL: ${ZOCR_API_S3_ENDPOINT_URL:-}
      ZOCR_API_S3_FORCE_PATH_STYLE: ${ZOCR_API_S3_FORCE_PATH_STYLE:-0}
      ZOCR_API_S3_PRESIGN_ENABLED: ${ZOCR_API_S3_PRESIGN_ENABLED:-1}
      ZOCR_API_S3_PRESIGN_TTL_SEC: ${ZOCR_API_S3_PRESIGN_TTL_SEC:-3600}
      ZOCR_API_JOBS_MAX_COUNT: ${ZOCR_API_JOBS_MAX_COUNT:-200}
      ZOCR_API_JOBS_TTL_HOURS: ${ZOCR_API_JOBS_TTL_HOURS:-168}
      ZOCR_API_JOBS_RESUME_ON_STARTUP: ${ZOCR_API_JOBS_RESUME_ON_STARTUP:-1}
      ZOCR_API_JOBS_CLEANUP_ON_STARTUP: ${ZOCR_API_JOBS_CLEANUP_ON_STARTUP:-1}
      ZOCR_API_JOBS_CLEANUP_ON_CREATE: ${ZOCR_API_JOBS_CLEANUP_ON_CREATE:-1}
      ZOCR_API_LOG_FORMAT: ${ZOCR_API_LOG_FORMAT:-json}
      ZOCR_API_LOG_LEVEL: ${ZOCR_API_LOG_LEVEL:-INFO}
      ZOCR_API_METRICS_ENABLED: ${ZOCR_API_METRICS_ENABLED:-1}
      ZOCR_API_MULTI_TENANT_ENABLED: ${ZOCR_API_MULTI_TENANT_ENABLED:-0}
      ZOCR_API_DEFAULT_TENANT: ${ZOCR_API_DEFAULT_TENANT-default}
      ZOCR_API_TENANT_MAX_ACTIVE_JOBS: ${ZOCR_API_TENANT_MAX_ACTIVE_JOBS:-0}
      ZOCR_API_TENANT_MAX_STORED_JOBS: ${ZOCR_API_TENANT_MAX_STORED_JOBS:-0}
      ZOCR_API_TENANT_APPROVAL_REQUIRED: ${ZOCR_API_TENANT_APPROVAL_REQUIRED:-0}
      ZOCR_API_TENANT_APPROVAL_ALLOW_SELF: ${ZOCR_API_TENANT_APPROVAL_ALLOW_SELF:-0}
      ZOCR_API_TENANT_APPROVAL_MIN_APPROVERS: ${ZOCR_API_TENANT_APPROVAL_MIN_APPROVERS:-1}
      ZOCR_API_TENANT_APPROVAL_NOTIFY_URL: ${ZOCR_API_TENANT_APPROVAL_NOTIFY_URL:-}
      ZOCR_API_TENANT_APPROVAL_NOTIFY_TIMEOUT_SEC: ${ZOCR_API_TENANT_APPROVAL_NOTIFY_TIMEOUT_SEC:-2}
      ZOCR_API_TENANT_APPROVAL_NOTIFY_HEADERS_JSON: ${ZOCR_API_TENANT_APPROVAL_NOTIFY_HEADERS_JSON:-}
      ZOCR_API_TENANT_PLANS_JSON: ${ZOCR_API_TENANT_PLANS_JSON:-}
      ZOCR_API_TENANT_POLICIES_JSON: ${ZOCR_API_TENANT_POLICIES_JSON:-}
      ZOCR_API_AUDIT_SINKS: ${ZOCR_API_AUDIT_SINKS:-}
      ZOCR_API_AUDIT_READ_BACKEND: ${ZOCR_API_AUDIT_READ_BACKEND:-auto}
      ZOCR_API_AUDIT_LOG_PATH: ${ZOCR_API_AUDIT_LOG_PATH:-}
      ZOCR_API_AUDIT_DATABASE_URL: ${ZOCR_API_AUDIT_DATABASE_URL:-}
      ZOCR_API_AUDIT_DB_AUTO_INIT: ${ZOCR_API_AUDIT_DB_AUTO_INIT:-1}
      ZOCR_API_AUDIT_HTTP_URL: ${ZOCR_API_AUDIT_HTTP_URL:-}
      ZOCR_API_AUDIT_HTTP_TIMEOUT_SEC: ${ZOCR_API_AUDIT_HTTP_TIMEOUT_SEC:-2}
      ZOCR_API_AUDIT_HTTP_HEADERS_JSON: ${ZOCR_API_AUDIT_HTTP_HEADERS_JSON:-}
    ports:
      - "8000:8000"
    volumes:
      - zocr_api_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
  worker:
    profiles: ["saas"]
    image: ${ZOCR_API_IMAGE:-zocr-suite:latest}
    build:
      context: .
      args:
        ZOCR_EXTRAS: ${ZOCR_EXTRAS:-api}
        ZOCR_APT_PACKAGES: ${ZOCR_APT_PACKAGES:-poppler-utils}
    command: ["zocr-worker"]
    environment:
      ZOCR_API_STORAGE_BACKEND: ${ZOCR_API_STORAGE_BACKEND:-local}
      ZOCR_API_METADATA_BACKEND: ${ZOCR_API_METADATA_BACKEND:-local}
      ZOCR_API_STORAGE_DIR: ${ZOCR_API_STORAGE_DIR:-/data}
      ZOCR_API_DATABASE_URL: ${ZOCR_API_DATABASE_URL:-postgresql://zocr:zocr@postgres:5432/zocr}
      ZOCR_API_DB_AUTO_INIT: ${ZOCR_API_DB_AUTO_INIT:-1}
      ZOCR_API_REDIS_URL: ${ZOCR_API_REDIS_URL:-redis://redis:6379/0}
      ZOCR_API_REDIS_STREAM: ${ZOCR_API_REDIS_STREAM:-zocr_jobs}
      ZOCR_API_REDIS_GROUP: ${ZOCR_API_REDIS_GROUP:-zocr_workers}
      ZOCR_API_S3_BUCKET: ${ZOCR_API_S3_BUCKET:-}
      ZOCR_API_S3_PREFIX: ${ZOCR_API_S3_PREFIX:-zocr}
      ZOCR_API_S3_REGION: ${ZOCR_API_S3_REGION:-}
      ZOCR_API_S3_ENDPOINT_URL: ${ZOCR_API_S3_ENDPOINT_URL:-}
      ZOCR_API_S3_FORCE_PATH_STYLE: ${ZOCR_API_S3_FORCE_PATH_STYLE:-0}
      ZOCR_API_S3_PRESIGN_ENABLED: ${ZOCR_API_S3_PRESIGN_ENABLED:-1}
      ZOCR_API_S3_PRESIGN_TTL_SEC: ${ZOCR_API_S3_PRESIGN_TTL_SEC:-3600}
      ZOCR_API_LOG_FORMAT: ${ZOCR_API_LOG_FORMAT:-json}
      ZOCR_API_LOG_LEVEL: ${ZOCR_API_LOG_LEVEL:-INFO}
      ZOCR_API_MULTI_TENANT_ENABLED: ${ZOCR_API_MULTI_TENANT_ENABLED:-0}
      ZOCR_API_DEFAULT_TENANT: ${ZOCR_API_DEFAULT_TENANT-default}
      ZOCR_WORKER_BLOCK_MS: ${ZOCR_WORKER_BLOCK_MS:-5000}
      ZOCR_WORKER_CLAIM_IDLE_MS: ${ZOCR_WORKER_CLAIM_IDLE_MS:-60000}
      ZOCR_WORKER_CLAIM_COUNT: ${ZOCR_WORKER_CLAIM_COUNT:-10}
    volumes:
      - zocr_api_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  redis:
    profiles: ["saas"]
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - zocr_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
  postgres:
    profiles: ["saas"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zocr}
      POSTGRES_USER: ${POSTGRES_USER:-zocr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zocr}
    volumes:
      - zocr_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zocr} -d ${POSTGRES_DB:-zocr}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  zocr_api_data:
  zocr_redis_data:
  zocr_pg_data:
